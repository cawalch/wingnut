# pnpm settings (pnpm 11 reads settings here, not the package.json "pnpm" field)
# https://pnpm.io/settings
allowBuilds:
  esbuild: true
# Security overrides for vulnerable transitive deps (Jun 2026 advisories).
# All four are dev-only transitives (test/build tooling); wingnut ships only
# `dist/index.js` (externalizes express + ajv), so these do not reach consumers.
overrides:
  vite: 7.3.5         # GHSA path traversal + arbitrary file read + fs.deny bypass (vitest mocker accepts ^7)
  qs: 6.15.2          # GHSA DoS via null/undefined entries + arrayLimit bypass (express/superagent)
  esbuild: 0.28.1     # GHSA RCE via NPM_CONFIG_REGISTRY + arbitrary file read (pulled by tsx via vite)
  fast-uri: 3.1.2     # GHSA host confusion + path traversal (transitive of ajv; pinned exact)
